name: farmlink_ug
description: "FarmLink UG - AgTech platform for Ugandan farmers. Offline-first, decentralized knowledge network."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- STATE MANAGEMENT ---
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # --- NAVIGATION ---
  go_router: ^13.0.0

  # --- OFFLINE ENGINE (Will be re-enabled after AGP 8.x compatibility fixes) ---
  # isar: ^3.1.0
  # isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.3

  # --- BACKEND & AUTH (Supabase) ---
  supabase_flutter: ^2.10.0

  # --- NETWORKING & SYNC ---
  dio: ^5.3.0
  connectivity_plus: ^5.0.0

  # --- AI & IMAGE HANDLING ---
  image_picker: ^1.0.0
  # image_cropper: ^4.0.0  # Removed - not used in codebase (AGP 8.x incompatibility)
  image: ^4.1.0

  # --- UTILS & DATA TYPES ---
  intl: ^0.19.0
  equatable: ^2.0.0
  dartz: ^0.10.0
  logger: ^2.0.0
  path: ^1.9.0

  # --- UI COMPONENTS ---
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0

  # --- PAYMENTS (Uganda) ---
  flutterwave_standard: ^1.0.4

  # --- AUDIO-FIRST DESIGN ---
  # record: ^4.4.0  # Disabled for AGP 8.x compatibility
  audioplayers: ^5.2.1

dependency_overrides:
  # Force AGP 8.x compatible versions for transitive dependencies
  flutter_inappwebview: ^6.1.5
  sign_in_with_apple: ^7.0.0
  supabase: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # --- CODE GENERATION ---
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  # isar_generator: ^3.1.0  (Disabled temporarily for AGP 8.x compatibility)

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/